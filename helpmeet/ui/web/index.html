<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Helpmeet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <button id="toggleSidebar" class="icon-btn" title="Mostrar/ocultar panel">☰</button>
    <span class="logo">◆ Helpmeet</span>
    <span class="spacer"></span>
    <span id="status" class="status"></span>
    <select id="monitor" class="monitor" title="Pantalla a capturar"></select>
    <button id="btnRec" class="btn rec">● Grabar</button>
    <button id="btnImport" class="btn import">📹 Subir video</button>
    <button id="btnScreenRec" class="btn screenrec">🎥 Grabar pantalla</button>
    <button id="btnMic" class="btn mic" hidden>🎤 Micro</button>
    <button id="btnCap" class="btn cap" disabled>📷 Captura</button>
    <button id="btnNote" class="btn note" disabled>📝 Nota</button>
    <button id="btnExp" class="btn exp" disabled>📂 Abrir carpeta</button>
    <button id="btnSettings" class="icon-btn" title="Ajustes">⚙️</button>
  </header>

  <div id="progress" class="progress hidden"><div class="progress-bar"></div></div>

  <div class="body">
    <aside id="sidebar">
      <div class="side-head">
        <span class="side-title">Iniciativas</span>
        <button id="newIni" class="ghost-sm" title="Nueva iniciativa">+ Nueva</button>
      </div>
      <input id="search" class="search-box" type="search"
             placeholder="🔎 Buscar en todo (Enter)…">
      <div id="iniList" class="ini-list"></div>
      <div class="library-nav">
        <button id="btnArchive" class="library-link">🗄️ Archivo</button>
        <button id="btnTrash" class="library-link">🗑️ Papelera</button>
      </div>
    </aside>

    <main id="transcript">
      <div class="empty">
        <div class="empty-icon">🎙️</div>
        <p>Elige una iniciativa en el panel y pulsa <b>Grabar</b>.</p>
      </div>
    </main>
  </div>

  <div id="ctxmenu" class="ctxmenu hidden"></div>

  <div id="settings" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h3>⚙️ Ajustes</h3>
        <button id="closeSettings" class="icon-btn" title="Cerrar">✕</button>
      </div>

      <div class="field">
        <label for="apiToken">API key de Replicate</label>
        <div class="field-row">
          <input id="apiToken" type="password" placeholder="r8_…">
          <button id="saveToken" class="btn cap">Guardar</button>
        </div>
        <small id="tokenStatus" class="hint"></small>
      </div>

      <div class="field">
        <label for="exportDir">Carpeta de exportación</label>
        <div class="field-row">
          <input id="exportDir" type="text" readonly>
          <button id="chooseDir" class="btn cap">Elegir…</button>
        </div>
        <small class="hint">Aquí se guardan los .md y las carpetas de capturas.</small>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
