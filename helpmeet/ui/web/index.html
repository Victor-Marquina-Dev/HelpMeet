<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Helpmeet</title>
  <link rel="icon" type="image/svg+xml" href="assets/helpmeet-app-icon.svg">
  <link rel="alternate icon" type="image/x-icon" href="assets/helpmeet.ico">
  <link rel="stylesheet" href="style.css?v=20260624-8">
</head>
<body data-app-state="idle" data-screen="welcome">

  <!-- Rail rojo persistente durante grabación/captura de pantalla -->
  <div class="rec-rail" id="recRail" aria-hidden="true"></div>

  <!-- ============ BARRA SUPERIOR GLOBAL ============ -->
  <header class="topbar">
    <button class="icon-btn" id="btnToggleSidebar" aria-label="Mostrar u ocultar panel" title="Mostrar/ocultar panel (Ctrl+B)"></button>
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"><img src="assets/helpmeet-app-icon.svg" alt=""></span>
      <span class="brand-name">Helpmeet</span>
    </div>
    <div class="topbar-sep" aria-hidden="true"></div>

    <!-- Centro: contexto activo (iniciativa › reunión) en reposo · estado de grabación/proceso cuando hay actividad -->
    <div class="topbar-status" id="topbarStatus" aria-live="polite"></div>

    <!-- Cluster derecho: silenciar micro · buscar · ajustes -->
    <div class="topbar-right">
      <button class="audio-chip" id="btnMic" aria-pressed="false" aria-label="Silenciar micrófono" title="Silenciar micrófono">
        <span class="mic-ico" aria-hidden="true"></span>
        <span class="eq mini" aria-hidden="true"><i></i><i></i><i></i></span>
      </button>
      <div class="search" id="search" role="search">
        <span class="search-ico" aria-hidden="true"></span>
        <input id="searchInput" type="search" placeholder="Buscar en todas las reuniones…" aria-label="Buscar frases y notas" autocomplete="off">
        <kbd id="searchKbd">Ctrl K</kbd>
      </div>
      <button class="icon-btn" id="btnSettings" aria-label="Ajustes" title="Ajustes"></button>
    </div>
  </header>

  <!-- ============ CUERPO ============ -->
  <div class="body">
    <!-- Sidebar de iniciativas/reuniones -->
    <aside class="sidebar" id="sidebar" aria-label="Iniciativas y reuniones">
      <div class="sidebar-head">
        <span class="sidebar-title">INICIATIVAS</span>
        <button class="icon-btn sm" id="btnNewInitiative" aria-label="Nueva iniciativa" title="Nueva iniciativa (Ctrl+N)"></button>
      </div>
      <nav class="sidebar-tree" id="sidebarTree" aria-label="Lista de iniciativas">
        <!-- inyectado por app.js -->
      </nav>
      <div class="sidebar-foot">
        <button class="side-link" id="btnArchive"><span class="ico ico-archive"></span>Archivo<span class="count" id="archiveCount">0</span></button>
        <button class="side-link" id="btnTrash"><span class="ico ico-trash"></span>Papelera<span class="count" id="trashCount">0</span></button>
      </div>
    </aside>

    <!-- Rail colapsado -->
    <aside class="sidebar-rail" id="sidebarRail" aria-label="Panel colapsado" hidden>
      <button class="icon-btn" id="btnNewInitiativeRail" aria-label="Nueva iniciativa"></button>
    </aside>

    <!-- Área principal -->
    <main class="main" id="main" tabindex="-1">
      <!-- inyectado por app.js: welcome | initiative | meeting | search | glossary | archive | trash -->
    </main>
  </div>

  <!-- ============ BARRA DE ACCIONES CONTEXTUAL ============ -->
  <footer class="actionbar" id="actionbar" aria-label="Acciones">
    <!-- inyectado por app.js según el estado global -->
  </footer>

  <!-- ============ OVERLAYS ============ -->
  <div class="overlay" id="overlayRoot" hidden></div>
  <div class="toasts" id="toasts" aria-live="polite" aria-atomic="false"></div>

  <!-- Plantillas SVG de iconos (Lucide). Inyectadas por app.js -->
  <script src="app.js?v=20260624-8"></script>
</body>
</html>
